<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Abdelrahman Nazeh</title>
  <meta name="robots" content="noindex">
  <meta http-equiv="refresh" content="8;url=/portfolio/">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #081C30;
      color: #F0F6FA;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 480px;
    }
    .code {
      font-size: 80px;
      font-weight: 700;
      color: #3FC7B0;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 8px;
    }
    .ring {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #3FC7B0;
      border-radius: 50%;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #F0F6FA;
    }
    p {
      font-size: 15px;
      line-height: 1.6;
      color: #9FB8CC;
      margin-bottom: 28px;
    }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: #3FC7B0;
      color: #081C30;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .btn:hover {
      background: #8FE3D0;
    }
    .redirect {
      margin-top: 20px;
      font-size: 13px;
      color: #6E8AA3;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <div class="ring"></div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/portfolio/" class="btn">Return Home</a>
    <div class="redirect">Redirecting to homepage in a few seconds…</div>
  </div>
</body>
</html>
